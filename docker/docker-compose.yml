# Agent FirewallKit local stack: Postgres, ClickHouse, NATS (JetStream), Redis.
# Copy docker/.env.example to docker/.env and adjust as needed.

services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: agentfirewall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentfirewall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentfirewall}
      POSTGRES_DB: ${POSTGRES_DB:-agentfirewall}
      TZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" -h 127.0.0.1 -p 5432",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - agentfirewall

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_IMAGE_TAG:-24.8}
    container_name: agentfirewall-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-agentfirewall}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-agentfirewall}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-agentfirewall}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      TZ: UTC
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER:-agentfirewall}", "--password", "${CLICKHOUSE_PASSWORD:-agentfirewall}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - agentfirewall

  nats:
    image: nats:${NATS_IMAGE_TAG:-2.10-alpine}
    container_name: agentfirewall-nats
    restart: unless-stopped
    command:
      - "-js"
      - "-m"
      - "8222"
      - "-sd"
      - "/data"
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      # Alpine-based NATS image includes busybox nc; avoids relying on wget/curl in minimal images.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4222"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - agentfirewall

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    container_name: agentfirewall-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "volatile-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - agentfirewall

  agentfirewall-server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: agentfirewall-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AV_DATABASE_URL: postgres://${POSTGRES_USER:-agentfirewall}:${POSTGRES_PASSWORD:-agentfirewall}@postgres:5432/${POSTGRES_DB:-agentfirewall}
      AV_REDIS_URL: redis://redis:6379/0
      AV_NATS_URL: nats://nats:4222
      AV_CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-agentfirewall}:${CLICKHOUSE_PASSWORD:-agentfirewall}@clickhouse:8123
      AV_LISTEN_ADDR: 0.0.0.0:8080
      AV_GRPC_ADDR: 0.0.0.0:50051
      AV_METRICS_ADDR: 0.0.0.0:9090
      AV_HTTP_API_ENABLED: "true"
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${AGENTVAULT_HTTP_PORT:-8080}:8080"
      - "${AGENTVAULT_GRPC_PORT:-50051}:50051"
      - "${AGENTVAULT_METRICS_PORT:-9090}:9090"
    networks:
      - agentfirewall

volumes:
  postgres_data:
  clickhouse_data:
  nats_data:
  redis_data:

networks:
  agentfirewall:
    driver: bridge
